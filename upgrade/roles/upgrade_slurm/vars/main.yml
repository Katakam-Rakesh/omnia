---

mounted_dir_perm: "0755"
default_client_mount_options: "nosuid,rw,sync,hard,intr"
slurm_nfs_fail_msg: "Failed to mount NFS share. Please check if the NFS server is reachable or NFS is configured properly."
oim_metadata: "/opt/omnia/.data/oim_metadata.yml"
backup_slurm_nfs_contents: false # To create a copy of all slurm contents on the nfs share
slurm_2_1_backup_dir_effective: "{{ slurm_2_1_backup_dir | default('/opt/omnia/backups/upgrade/version_2.1.0.0') }}"
slurm_2_1_backup_subdir: "slurm_21_nfs_backups"
slurm_2_1_runfile_relative_path: "slurm/hpc_tools/runfile"
slurm_2_1_slurm_nfs_backup_root: "{{ slurm_2_1_backup_dir_effective }}/{{ slurm_2_1_backup_subdir }}"

slurm_backup_missing_storage_config_msg: >-
  Omnia 2.1 storage_config.yml not found at {{ slurm_2_1_storage_config_path }}.
  Slurm NFS backup will be skipped; proceeding without a 2.1 Slurm NFS backup.
slurm_backup_missing_omnia_config_msg: >-
  Omnia 2.1 omnia_config.yml not found at {{ slurm_2_1_omnia_config_path }}.
  Slurm NFS backup will be skipped; proceeding without a 2.1 Slurm NFS backup.
slurm_backup_missing_slurm_cluster_msg: >-
  No slurm_cluster entries found in 2.1 omnia_config.yml ({{ slurm_2_1_omnia_config_path }}).
  Slurm NFS backup will be skipped; proceeding without a 2.1 Slurm NFS backup.
slurm_backup_missing_nfs_name_msg: >-
  nfs_storage_name is not defined for the first slurm_cluster entry in 2.1 omnia_config.yml
  ({{ slurm_2_1_omnia_config_path }}). Slurm NFS backup will be skipped.
slurm_backup_missing_nfs_entry_msg: >-
  No NFS client entry in 2.1 storage_config.yml ({{ slurm_2_1_storage_config_path }}) with nfs_name {{ slurm_2_1_nfs_name }}.
  Slurm NFS backup will be skipped.
slurm_backup_remount_warn_msg: >-
  Slurm NFS client path {{ slurm_nfs_client_path }} was not initially mounted.
  A one-time mount was attempted and succeeded. Backup has been taken, but contents
  may not exactly reflect the original Omnia 2.1 state; rollback to 2.1 may not be fully accurate.
slurm_backup_unreachable_msg: >-
  Slurm NFS client path {{ slurm_nfs_client_path }} could not be mounted or accessed.
  No Slurm NFS backup has been taken. Proceeding without a 2.1 Slurm NFS backup.
slurm_backup_success_msg: >-
  Slurm NFS backup created at {{ slurm_2_1_slurm_nfs_backup_root }} from client path {{ slurm_nfs_client_path }}.
slurm_backup_runfile_remove_msg: >-
  Removing Slurm runfile directory {{ slurm_nfs_runfile_path }} from NFS share as part of upgrade cleanup.
slurm_backup_guidance_msg: >-
  Slurm NFS backup flow completed. If you plan to reprovision the cluster, run provision.yml next.
  If the cluster has both Kubernetes and Slurm, do not reboot Kubernetes nodes after running provision.yml.
