# ═══════════════════════════════════════════════════════════════════════════
# PowerScale CSI Driver Upgrade - Phase 6: Post-Upgrade Validation
# ═══════════════════════════════════════════════════════════════════════════
# This task file validates the PowerScale CSI driver upgrade:
# 1. Verify Helm release status
# 2. Verify all pods are Running and Ready (with retries)
# 3. Verify driver version matches target
# 4. Verify StorageClasses are intact
# 5. Verify existing PVs/PVCs are still Bound
# 6. Check pod logs for critical errors
#
# Prerequisites:
# - Phase 5 (Execute Upgrade) completed
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# Step 1: Verify Helm release status
# ───────────────────────────────────────────────────────────────────────────
- name: Get PowerScale Helm release status
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: helm list -n {{ powerscale_namespace }} -o json
  register: powerscale_helm_status
  changed_when: false

- name: Parse Helm release status
  ansible.builtin.set_fact:
    powerscale_helm_release: >-
      {{ powerscale_helm_status.stdout | from_json |
         selectattr('name', 'equalto', powerscale_release_name) | first }}

- name: Verify Helm release is deployed
  ansible.builtin.fail:
    msg: "PowerScale Helm release is not in deployed state. Status: {{ powerscale_helm_release.status }}"
  when: powerscale_helm_release.status != "deployed"

- name: Display Helm release info
  ansible.builtin.debug:
    msg:
      - "Helm release: {{ powerscale_helm_release.name }}"
      - "Status: {{ powerscale_helm_release.status }}"
      - "Chart: {{ powerscale_helm_release.chart }}"
      - "Revision: {{ powerscale_helm_release.revision }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 2: Verify all controller pods are Running and Ready (with retries)
# ───────────────────────────────────────────────────────────────────────────
- name: Wait for PowerScale controller pods to be Running and Ready
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pods -n {{ powerscale_namespace }} -l app=isilon-controller -o json | \
        jq -r '.items[] | select(.status.phase=="Running" and 
        (.status.conditions[] | select(.type=="Ready" and .status=="True"))) | .metadata.name' | wc -l
    executable: /bin/bash
  register: powerscale_controller_ready
  until: powerscale_controller_ready.stdout | int >= 1
  retries: 60
  delay: 10
  changed_when: false

- name: Get controller pod details
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get pods -n {{ powerscale_namespace }} -l app=isilon-controller -o json
  register: powerscale_controller_pods
  changed_when: false

- name: Parse controller pod status
  ansible.builtin.set_fact:
    powerscale_controller_count: "{{ (powerscale_controller_pods.stdout | from_json).items | length }}"
    powerscale_controller_ready_count: "{{ powerscale_controller_ready.stdout }}"

- name: Display controller pod status
  ansible.builtin.debug:
    msg: "PowerScale controller pods: {{ powerscale_controller_ready_count }}/{{ powerscale_controller_count }} ready"

# ───────────────────────────────────────────────────────────────────────────
# Step 3: Verify node daemonset is ready (with retries)
# ───────────────────────────────────────────────────────────────────────────
- name: Wait for PowerScale node daemonset to be ready
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.command:
    cmd: kubectl get daemonset isilon-node -n {{ powerscale_namespace }} -o json
  register: powerscale_node_ds
  until: >
    (powerscale_node_ds.stdout | from_json).status.numberReady ==
    (powerscale_node_ds.stdout | from_json).status.desiredNumberScheduled
  retries: 60
  delay: 10
  changed_when: false

- name: Parse daemonset status
  ansible.builtin.set_fact:
    powerscale_ds_desired: "{{ (powerscale_node_ds.stdout | from_json).status.desiredNumberScheduled }}"
    powerscale_ds_ready: "{{ (powerscale_node_ds.stdout | from_json).status.numberReady }}"

- name: Display node daemonset status
  ansible.builtin.debug:
    msg: "PowerScale node daemonset: {{ powerscale_ds_ready }}/{{ powerscale_ds_desired }} ready"

# ───────────────────────────────────────────────────────────────────────────
# Step 4: Verify driver version matches target
# ───────────────────────────────────────────────────────────────────────────
- name: Get PowerScale driver version from controller pod
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pods -n {{ powerscale_namespace }} -l app=isilon-controller \
        -o jsonpath='{.items[0].spec.containers[?(@.name=="driver")].image}' | \
        grep -oP 'v\d+\.\d+\.\d+' || echo "unknown"
    executable: /bin/bash
  register: powerscale_actual_version
  changed_when: false

- name: Verify driver version matches target
  ansible.builtin.fail:
    msg: "Driver version mismatch. Expected: {{ powerscale_target_version }}, Actual: {{ powerscale_actual_version.stdout }}"
  when: powerscale_actual_version.stdout != powerscale_target_version

- name: Display driver version
  ansible.builtin.debug:
    msg: "PowerScale driver version verified: {{ powerscale_actual_version.stdout }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 5: Verify StorageClasses are intact
# ───────────────────────────────────────────────────────────────────────────
- name: Get PowerScale StorageClasses
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get storageclass -o json | \
        jq -r '.items[] | select(.provisioner=="csi-isilon.dellemc.com") | .metadata.name'
    executable: /bin/bash
  register: powerscale_storageclasses
  changed_when: false

- name: Verify StorageClasses exist
  ansible.builtin.fail:
    msg: "No PowerScale StorageClasses found after upgrade"
  when: powerscale_storageclasses.stdout_lines | length == 0

- name: Display StorageClasses
  ansible.builtin.debug:
    msg: "PowerScale StorageClasses found: {{ powerscale_storageclasses.stdout_lines }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 6: Verify existing PVCs are still Bound
# ───────────────────────────────────────────────────────────────────────────
- name: Check for PowerScale PersistentVolumeClaims
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pvc --all-namespaces -o json | \
        jq -r '.items[] | select(.spec.storageClassName | 
        test("csi-isilon.dellemc.com|powerscale|isilon")) | 
        "\(.metadata.namespace)/\(.metadata.name):\(.status.phase)"'
    executable: /bin/bash
  register: powerscale_pvcs
  changed_when: false
  failed_when: false

- name: Check for unbound PVCs
  ansible.builtin.set_fact:
    powerscale_failed_pvcs: >-
      {{ powerscale_pvcs.stdout_lines | 
         select('search', ':(Pending|Lost)') | list }}
  when: powerscale_pvcs.stdout_lines | length > 0

- name: Warn if PVCs are not Bound
  ansible.builtin.debug:
    msg: "WARNING: Some PowerScale PVCs are not in Bound state: {{ powerscale_failed_pvcs }}"
  when:
    - powerscale_pvcs.stdout_lines | length > 0
    - powerscale_failed_pvcs | length > 0

- name: Display PVC status
  ansible.builtin.debug:
    msg: "PowerScale PVCs checked: {{ powerscale_pvcs.stdout_lines | length }} found"
  when: powerscale_pvcs.stdout_lines | length > 0

# ───────────────────────────────────────────────────────────────────────────
# Step 7: Check controller pod logs for critical errors
# ───────────────────────────────────────────────────────────────────────────
- name: Check controller pod logs for errors
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl logs -n {{ powerscale_namespace }} -l app=isilon-controller \
        --tail=100 --all-containers=true | grep -iE "error|fatal|panic" | head -20 || echo "No critical errors found"
    executable: /bin/bash
  register: powerscale_controller_logs
  changed_when: false
  failed_when: false

- name: Display controller log check result
  ansible.builtin.debug:
    msg: "Controller logs: {{ powerscale_controller_logs.stdout_lines[:5] if powerscale_controller_logs.stdout_lines else ['No critical errors'] }}"

# ───────────────────────────────────────────────────────────────────────────
# Step 8: Display post-upgrade validation summary
# ───────────────────────────────────────────────────────────────────────────
- name: Display PowerScale post-upgrade validation summary
  ansible.builtin.debug:
    msg:
      - "PowerScale CSI driver post-upgrade validation completed"
      - "  Helm release: {{ powerscale_helm_release.name }} ({{ powerscale_helm_release.status }})"
      - "  Chart version: {{ powerscale_helm_release.chart }}"
      - "  Driver version: {{ powerscale_actual_version.stdout }}"
      - "  Controller pods: {{ powerscale_controller_ready_count }}/{{ powerscale_controller_count }} ready"
      - "  Node daemonset: {{ powerscale_ds_ready }}/{{ powerscale_ds_desired }} ready"
      - "  StorageClasses: {{ powerscale_storageclasses.stdout_lines | length }} found"
      - "  PersistentVolumeClaims: {{ powerscale_pvcs.stdout_lines | length }} checked"
