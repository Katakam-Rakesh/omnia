---
# ============================================================================
# PowerScale CSI Driver Backup Tasks
# ============================================================================
# Purpose: Backup current PowerScale CSI driver state for rollback capability
#
# This task file backs up:
#   - Helm release values and manifest
#   - Secrets (credentials, certificates)
#   - StorageClasses
#   - PersistentVolumes (if exist)
#   - PersistentVolumeClaims (if exist)
#   - VolumeSnapshotClass (if exist)
#   - VolumeSnapshots (if exist)
#   - Backup metadata
# ============================================================================

- name: Create PowerScale backup directory
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0755"

- name: Backup Helm release values
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: helm get values {{ powerscale_release_name }} -n isilon -o yaml > {{ backup_dir }}/powerscale-helm-values.yaml
  register: helm_values_backup
  changed_when: true
  failed_when: false

- name: Backup Helm release manifest
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: helm get manifest {{ powerscale_release_name }} -n isilon > {{ backup_dir }}/powerscale-helm-manifest.yaml
  register: helm_manifest_backup
  changed_when: true
  failed_when: false

- name: Backup secret isilon-creds
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: kubectl get secret isilon-creds -n isilon -o yaml > {{ backup_dir }}/powerscale-secret-creds.yaml
  register: secret_creds_backup
  changed_when: true
  failed_when: false

- name: Backup secret isilon-certs-0
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: kubectl get secret isilon-certs-0 -n isilon -o yaml > {{ backup_dir }}/powerscale-secret-certs.yaml
  register: secret_certs_backup
  changed_when: true
  failed_when: false

- name: Backup PowerScale StorageClasses
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get storageclass -o json | \
        jq '.items[] | select(.provisioner=="csi-isilon.dellemc.com")' | \
        jq -s '{"apiVersion":"v1","kind":"List","items":.}' > \
        {{ backup_dir }}/powerscale-storageclasses.json
  register: storageclass_backup
  changed_when: true
  failed_when: false

- name: Check if PowerScale PersistentVolumes exist
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl get pv -o json | \
        jq '[.items[] | select(.spec.csi.driver=="csi-isilon.dellemc.com")] | length'
  register: pv_count_check
  changed_when: false
  failed_when: false

- name: Backup PowerScale PersistentVolumes
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pv_count=$(kubectl get pv -o json | \
        jq '[.items[] | select(.spec.csi.driver=="csi-isilon.dellemc.com")] | length')
      if [ "$pv_count" -gt 0 ]; then
        kubectl get pv -o json | \
          jq '.items[] | select(.spec.csi.driver=="csi-isilon.dellemc.com")' | \
          jq -s '{"apiVersion":"v1","kind":"List","items":.}' > \
          {{ backup_dir }}/powerscale-persistentvolumes.json
        echo "Backed up $pv_count PowerScale PVs"
      else
        echo "No PowerScale PVs found, skipping backup"
      fi
  register: pv_backup
  changed_when: "'Backed up' in pv_backup.stdout"
  failed_when: false

- name: Display PV backup result
  ansible.builtin.debug:
    msg: "{{ pv_backup.stdout }}"

- name: Backup PowerScale PersistentVolumeClaims
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      sc_names=$(kubectl get storageclass -o json | \
        jq -r '.items[] | select(.provisioner=="csi-isilon.dellemc.com") | .metadata.name' | \
        paste -sd '|')
      if [ -n "$sc_names" ]; then
        pvc_count=$(kubectl get pvc --all-namespaces -o json | \
          jq --arg sc "$sc_names" \
          '[.items[] | select(.spec.storageClassName | test($sc))] | length')
        if [ "$pvc_count" -gt 0 ]; then
          kubectl get pvc --all-namespaces -o json | \
            jq --arg sc "$sc_names" \
            '.items[] | select(.spec.storageClassName | test($sc))' | \
            jq -s '{"apiVersion":"v1","kind":"List","items":.}' > \
            {{ backup_dir }}/powerscale-persistentvolumeclaims.json
          echo "Backed up $pvc_count PowerScale PVCs"
        else
          echo "No PowerScale PVCs found, skipping backup"
        fi
      else
        echo "No PowerScale StorageClasses found, skipping PVC backup"
      fi
  register: pvc_backup
  changed_when: "'Backed up' in pvc_backup.stdout"
  failed_when: false

- name: Display PVC backup result
  ansible.builtin.debug:
    msg: "{{ pvc_backup.stdout }}"

- name: Check if VolumeSnapshotClass CRD exists
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl api-resources | grep -q volumesnapshotclass && echo "exists" || echo "not_found"
  register: vsclass_crd_check
  changed_when: false
  failed_when: false

- name: Backup PowerScale VolumeSnapshotClass
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      vsclass_count=$(kubectl get volumesnapshotclass -o json 2>/dev/null | \
        jq '[.items[] | select(.driver=="csi-isilon.dellemc.com")] | length' || echo 0)
      if [ "$vsclass_count" -gt 0 ]; then
        kubectl get volumesnapshotclass -o json | \
          jq '.items[] | select(.driver=="csi-isilon.dellemc.com")' | \
          jq -s '{"apiVersion":"snapshot.storage.k8s.io/v1","kind":"List","items":.}' > \
          {{ backup_dir }}/powerscale-volumesnapshotclass.json
        echo "Backed up $vsclass_count VolumeSnapshotClass"
      else
        echo "No PowerScale VolumeSnapshotClass found, skipping backup"
      fi
  register: vsclass_backup
  changed_when: "'Backed up' in vsclass_backup.stdout"
  failed_when: false
  when: vsclass_crd_check.stdout == "exists"

- name: Display VolumeSnapshotClass backup result
  ansible.builtin.debug:
    msg: "{{ vsclass_backup.stdout | default('VolumeSnapshotClass CRD not installed') }}"

- name: Backup PowerScale VolumeSnapshots
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      vsclass_names=$(kubectl get volumesnapshotclass -o json 2>/dev/null | \
        jq -r '.items[] | select(.driver=="csi-isilon.dellemc.com") | .metadata.name' | \
        paste -sd '|' || echo "")
      if [ -n "$vsclass_names" ]; then
        vs_count=$(kubectl get volumesnapshot --all-namespaces -o json 2>/dev/null | \
          jq --arg vsc "$vsclass_names" \
          '[.items[] | select(.spec.volumeSnapshotClassName | test($vsc))] | length' || \
          echo 0)
        if [ "$vs_count" -gt 0 ]; then
          kubectl get volumesnapshot --all-namespaces -o json | \
            jq --arg vsc "$vsclass_names" \
            '.items[] | select(.spec.volumeSnapshotClassName | test($vsc))' | \
            jq -s '{"apiVersion":"snapshot.storage.k8s.io/v1","kind":"List","items":.}' > \
            {{ backup_dir }}/powerscale-volumesnapshots.json
          echo "Backed up $vs_count VolumeSnapshots"
        else
          echo "No PowerScale VolumeSnapshots found, skipping backup"
        fi
      else
        echo "No PowerScale VolumeSnapshotClass found, skipping VolumeSnapshot backup"
      fi
  register: vs_backup
  changed_when: "'Backed up' in vs_backup.stdout"
  failed_when: false
  when: vsclass_crd_check.stdout == "exists"

- name: Display VolumeSnapshot backup result
  ansible.builtin.debug:
    msg: "{{ vs_backup.stdout | default('VolumeSnapshotClass CRD not installed') }}"

- name: Create backup metadata file
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.copy:
    content: |
      backup_timestamp: "{{ ansible_date_time.iso8601 }}"
      backup_by: "omnia_upgrade"
      helm_release_name: "{{ powerscale_release_name }}"
      helm_chart_version: "{{ powerscale_current_chart_version }}"
      driver_version: "{{ powerscale_current_driver_version }}"
      namespace: "isilon"
      backup_location: "{{ backup_dir }}"
      backup_files:
        - powerscale-helm-values.yaml
        - powerscale-helm-manifest.yaml
        - powerscale-secret-creds.yaml
        - powerscale-secret-certs.yaml
        - powerscale-storageclasses.json
        - powerscale-persistentvolumes.json (conditional)
        - powerscale-persistentvolumeclaims.json (conditional)
        - powerscale-volumesnapshotclass.json (conditional)
        - powerscale-volumesnapshots.json (conditional)
    dest: "{{ backup_dir }}/powerscale-backup-metadata.yaml"
    mode: "0644"

- name: Verify critical backup files exist
  delegate_to: "{{ kube_vip }}"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/{{ item }}"
  register: backup_file_check
  loop:
    - powerscale-helm-values.yaml
    - powerscale-helm-manifest.yaml
    - powerscale-secret-creds.yaml
    - powerscale-secret-certs.yaml
    - powerscale-storageclasses.json
    - powerscale-backup-metadata.yaml
  failed_when: not backup_file_check.stat.exists

- name: Display backup summary
  ansible.builtin.debug:
    msg: |
      PowerScale CSI driver backup completed successfully:
      - Backup location: {{ backup_dir }}
      - Helm release: {{ powerscale_release_name }}
      - Chart version: {{ powerscale_current_chart_version }}
      - Driver version: {{ powerscale_current_driver_version }}
      - Backup timestamp: {{ ansible_date_time.iso8601 }}
      - Critical files backed up: 6 (mandatory)
      - Conditional files: Check logs above for PVs/PVCs/Snapshots
