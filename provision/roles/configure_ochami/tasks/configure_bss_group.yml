---

- name: Set the functional_group_name
  ansible.builtin.set_fact:
    functional_group_name: "{{ item }}"

- name: Compute omnia and k8s naming suffix for image
  ansible.builtin.set_fact:
    naming_suffix: >-
      {{ '_omnia_' + hostvars['localhost']['oim_metadata']['omnia_version']
         if hostvars['localhost']['oim_metadata']['omnia_version'] | default('') | length > 0
         else '' }}{{ '_k8s_' + hostvars['localhost']['service_k8s_version']
         if (item is match('service_kube_')) and (hostvars['localhost']['service_k8s_version'] | default('') | length > 0)
         else '' }}

- name: Build image search pattern
  ansible.builtin.set_fact:
    image_search_pattern: >-
      rhel-{{ functional_group_name }}{{ naming_suffix }}

- name: Verify image, kernel and initramfs in S3 (build stream and image-key)
  ansible.builtin.shell: |
    set -o pipefail && \
    s3cmd ls -Hr s3://boot-images | \
    grep "{{ image_search_pattern }}{{ compute_image_suffix }}" | \
    grep {{ hostvars['localhost']['cluster_os_version'] }} | sort -k1,2r | awk '{print $4}' | sed 's|s3://||'
  changed_when: false
  failed_when: false
  register: verify_s3_image_build_stream
  when:
    - enable_build_stream | default(false)
    - (compute_image_suffix | default('')) != ''

- name: Verify image, kernel and initramfs in S3 (default)
  ansible.builtin.shell: |
    set -o pipefail && \
    s3cmd ls -Hr s3://boot-images | \
    grep "{{ image_search_pattern }}" | \
    grep {{ hostvars['localhost']['cluster_os_version'] }} | sort -k1,2r | awk '{print $4}' | sed 's|s3://||'
  changed_when: false
  failed_when: false
  register: verify_s3_image
  when:
    - not enable_build_stream

- name: Set kernel and initrd variables (build stream)
  ansible.builtin.set_fact:
    kernel: "{{ verify_s3_image_build_stream.stdout_lines | select('search', 'vmlinuz') | list | first }}"
    initrd: "{{ verify_s3_image_build_stream.stdout_lines | select('search', 'initramfs') | list | first }}"
  when:
    - enable_build_stream
    - (compute_image_suffix | default('')) != ''
    - hostvars['localhost']['kernel_version_override'] | default('') | length == 0

- name: Set kernel and initrd variables (build stream - kernel override)
  vars:
    _kvo: "{{ hostvars['localhost']['kernel_version_override'] }}"
    _bs_lines: "{{ verify_s3_image_build_stream.stdout_lines }}"
  ansible.builtin.set_fact:
    kernel: "{{ _bs_lines | select('search', 'vmlinuz') | select('search', _kvo) | list | first }}"
    initrd: "{{ _bs_lines | select('search', 'initramfs') | select('search', _kvo) | list | first }}"
  when:
    - enable_build_stream
    - (compute_image_suffix | default('')) != ''
    - hostvars['localhost']['kernel_version_override'] | default('') | length > 0
    - _bs_lines | select('search', 'vmlinuz') | select('search', _kvo) | list | length > 0
    - _bs_lines | select('search', 'initramfs') | select('search', _kvo) | list | length > 0

- name: Set kernel and initrd variables (default)
  ansible.builtin.set_fact:
    kernel: "{{ verify_s3_image.stdout_lines | select('search', 'vmlinuz') | list | first }}"
    initrd: "{{ verify_s3_image.stdout_lines | select('search', 'initramfs') | list | first }}"
  when:
    - not enable_build_stream
    - hostvars['localhost']['kernel_version_override'] | default('') | length == 0

- name: Set kernel and initrd variables (default - kernel override)
  vars:
    _kvo: "{{ hostvars['localhost']['kernel_version_override'] }}"
    _s3_lines: "{{ verify_s3_image.stdout_lines }}"
  ansible.builtin.set_fact:
    kernel: "{{ _s3_lines | select('search', 'vmlinuz') | select('search', _kvo) | list | first }}"
    initrd: "{{ _s3_lines | select('search', 'initramfs') | select('search', _kvo) | list | first }}"
  when:
    - not enable_build_stream
    - hostvars['localhost']['kernel_version_override'] | default('') | length > 0
    - _s3_lines | select('search', 'vmlinuz') | select('search', _kvo) | list | length > 0
    - _s3_lines | select('search', 'initramfs') | select('search', _kvo) | list | length > 0

- name: Load bss template - {{ functional_group_name }}
  ansible.builtin.template:
    src: "{{ bss_template }}"
    dest: "{{ bss_dir }}/bss-{{ functional_group_name }}.yaml"
    mode: "{{ hostvars['localhost']['file_permissions_644'] }}"

- name: Delete boot configuration - {{ functional_group_name }}
  ansible.builtin.command: /usr/bin/ochami bss boot params delete --no-confirm -f yaml -d @{{ openchami_work_dir }}/boot/bss-{{ functional_group_name }}.yaml
  changed_when: true
  failed_when: false
  when: not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)

- name: Set boot configuration - {{ functional_group_name }}
  ansible.builtin.command: /usr/bin/ochami bss boot params set -f yaml -d @{{ openchami_work_dir }}/boot/bss-{{ functional_group_name }}.yaml
  changed_when: true
  when: not (hostvars['localhost']['upgrade_mode'] | default(false) | bool)
