---

# Deploy UFM InfiniBand telemetry (Metrics Only)
# Gated by: telemetry_sources.ufm.metrics_enabled
#
# DATA PIPELINE:
#   UFM Prometheus Exporter (HTTPS) → vmagent(shared) → victoria_metrics
#
# What Omnia does:
#   - Validates UFM endpoint, port, TLS mode, auth mode, credentials
#   - Creates K8s Secret with UFM credentials (and optional CA cert)
#   - VMAgent scrape config + deployment mount are handled by Jinja2 templates
#   - Deploys Grafana dashboard as ConfigMap (sidecar auto-discovery)
#
# What Omnia does NOT do:
#   - Omnia does NOT deploy or configure UFM itself

- name: Set UFM configuration facts
  ansible.builtin.set_fact:
    _ufm_config: "{{ telemetry_config.telemetry_sources.ufm }}"
    _ufm_detailed_config: "{{ telemetry_config.ufm_configuration }}"

- name: Load UFM credentials from omnia_config_credentials.yml
  block:
    - name: Check if credentials file is encrypted
      ansible.builtin.command: >-
        cat "{{ hostvars['localhost']['input_project_dir'] }}/omnia_config_credentials.yml"
      changed_when: false
      register: _ufm_cred_file_content
      delegate_to: localhost
      no_log: true

    - name: Decrypt credentials file if encrypted
      ansible.builtin.command: >-
        ansible-vault decrypt "{{ hostvars['localhost']['input_project_dir'] }}/omnia_config_credentials.yml"
        --vault-password-file "{{ hostvars['localhost']['input_project_dir'] }}/.omnia_config_credentials_key"
      when: "'$ANSIBLE_VAULT;' in _ufm_cred_file_content.stdout"
      changed_when: false
      delegate_to: localhost

    - name: Include credentials and extract UFM credentials
      ansible.builtin.include_vars:
        file: "{{ hostvars['localhost']['input_project_dir'] }}/omnia_config_credentials.yml"
        name: _omnia_creds
      no_log: true

    - name: Set UFM credentials as facts for template processing
      ansible.builtin.set_fact:
        ufm_username: "{{ _omnia_creds.ufm_username | default('') }}"
        ufm_password: "{{ _omnia_creds.ufm_password | default('') }}"
      no_log: true

    - name: Set CA certificate content for template processing
      ansible.builtin.set_fact:
        ufm_ca_cert_content: "{{ _ufm_ca_cert_content.content | default('') }}"
      when: 
        - _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed'
        - _ufm_detailed_config.ufm_ca_cert_path | default('') | trim != ''

    - name: Debug UFM credentials and file path
      ansible.builtin.debug:
        msg:
          - "Credentials file path: {{ hostvars['localhost']['input_project_dir'] }}/omnia_config_credentials.yml"
          - "UFM username found: {{ _omnia_creds.ufm_username is defined }}"
          - "UFM password found: {{ _omnia_creds.ufm_password is defined }}"
          - "UFM username length: {{ _omnia_creds.ufm_username | default('') | length }}"
          - "UFM password length: {{ _omnia_creds.ufm_password | default('') | length }}"
          - "Input project dir: {{ hostvars['localhost']['input_project_dir'] }}"

    - name: Re-encrypt credentials file if it was encrypted
      ansible.builtin.command: >-
        ansible-vault encrypt "{{ hostvars['localhost']['input_project_dir'] }}/omnia_config_credentials.yml"
        --vault-password-file "{{ hostvars['localhost']['input_project_dir'] }}/.omnia_config_credentials_key"
      when: "'$ANSIBLE_VAULT;' in _ufm_cred_file_content.stdout"
      changed_when: false
      delegate_to: localhost
  when: _ufm_config.metrics_enabled | default(false) | bool

# --- Validate UFM telemetry inputs ---
# Only run validation when UFM telemetry is enabled

- name: Validate UFM endpoint is not empty
  ansible.builtin.fail:
    msg: "{{ ufm_endpoint_empty_msg }}"
  when: 
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.ufm_endpoint | default('') | trim == ''

- name: Validate UFM metrics port range
  ansible.builtin.fail:
    msg: "{{ ufm_port_range_msg }}"
  when: >-
    (_ufm_config.metrics_enabled | default(false) | bool) and
    ((_ufm_detailed_config.ufm_metrics_port | default(9090) | int < 1) or
    (_ufm_detailed_config.ufm_metrics_port | default(9090) | int > 65535))

- name: Validate UFM TLS mode
  ansible.builtin.fail:
    msg: "{{ ufm_tls_mode_invalid_msg }}"
  when: 
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.tls_mode | default('self_signed') not in ['self_signed', 'ca_signed']

- name: Validate UFM auth mode
  ansible.builtin.fail:
    msg: "{{ ufm_auth_mode_invalid_msg }}"
  when: 
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.auth_mode | default('basic') not in ['basic', 'none']


- name: Validate UFM credentials when auth_mode is basic
  ansible.builtin.fail:
    msg: "{{ ufm_credentials_missing_msg }}"
  when:
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.auth_mode | default('basic') == 'basic'
    - (ufm_username | default('') | trim == '') or (ufm_password | default('') | trim == '')

- name: Validate CA certificate file when tls_mode is ca_signed
  when: 
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed'
  block:
    - name: Check CA certificate file exists
      ansible.builtin.stat:
        path: "{{ _ufm_detailed_config.ufm_ca_cert_path }}"
      register: _ufm_ca_cert_stat
      delegate_to: localhost

    - name: Fail if CA certificate file not found
      ansible.builtin.fail:
        msg: "{{ ufm_ca_cert_not_found_msg }}"
      when: >-
        (_ufm_detailed_config.ufm_ca_cert_path | default('') | trim == '') or
        (not _ufm_ca_cert_stat.stat.exists | default(false))

- name: Display validated UFM configuration
  ansible.builtin.debug:
    msg:
      - "UFM endpoint: {{ _ufm_detailed_config.ufm_endpoint }}:{{ _ufm_detailed_config.ufm_metrics_port | default(9001) }}"
      - "TLS mode: {{ _ufm_detailed_config.tls_mode | default('self_signed') }}"
      - "Auth mode: {{ _ufm_detailed_config.auth_mode | default('basic') }}"
    verbosity: 2
  when: _ufm_config.metrics_enabled | default(false) | bool


# --- Create UFM credentials Kubernetes Secret ---

- name: Read CA certificate content
  ansible.builtin.slurp:
    src: "{{ _ufm_detailed_config.ufm_ca_cert_path }}"
  register: _ufm_ca_cert_content
  delegate_to: localhost
  when:
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed'
    - _ufm_detailed_config.ufm_ca_cert_path | default('') | trim != ''


- name: Debug UFM credentials before template processing
  ansible.builtin.debug:
    msg:
      - "UFM username set: {{ ufm_username | default('') | length > 0 }}"
      - "UFM password set: {{ ufm_password | default('') | length > 0 }}"
      - "Auth mode: {{ _ufm_detailed_config.auth_mode | default('basic') }}"
      - "Metrics enabled: {{ _ufm_config.metrics_enabled | default(false) }}"
      - "Username length: {{ ufm_username | default('') | length }}"
      - "Password length: {{ ufm_password | default('') | length }}"
  when: _ufm_config.metrics_enabled | default(false) | bool

- name: Display UFM Secret creation status
  ansible.builtin.debug:
    msg: "{{ ufm_secret_created_msg }}"
    verbosity: 2
  when: _ufm_config.metrics_enabled | default(false) | bool

# --- Validate UFM endpoint connectivity (best-effort, warn only) ---

- name: Test UFM endpoint reachability
  ansible.builtin.uri:
    url: "{{ 'https' if _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed' else 'http' }}://{{ _ufm_detailed_config.ufm_endpoint }}:{{ _ufm_detailed_config.ufm_metrics_port | default(9090) }}/metrics"
    method: GET
    validate_certs: false
    timeout: "{{ ufm_endpoint_test_timeout }}"
    status_code: [200, 401, 403]
  register: _ufm_reachability
  failed_when: false
  delegate_to: localhost
  when: _ufm_config.metrics_enabled | default(false) | bool

- name: Display UFM endpoint reachability status
  ansible.builtin.debug:
    msg: >-
      UFM endpoint {{ 'https' if _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed' else 'http' }}://{{ _ufm_detailed_config.ufm_endpoint }}:{{ _ufm_detailed_config.ufm_metrics_port | default(9090) }}
      is {{ 'reachable' if _ufm_reachability.status | default(-1) | int in [200, 401, 403] else 'NOT reachable' }}
      (HTTP {{ _ufm_reachability.status | default('N/A') }}).
  when: _ufm_config.metrics_enabled | default(false) | bool

- name: Warn if UFM endpoint is unreachable
  ansible.builtin.debug:
    msg: "{{ ufm_endpoint_unreachable_msg }}"
  when: 
    - _ufm_config.metrics_enabled | default(false) | bool
    - _ufm_reachability.status | default(-1) | int not in [200, 401, 403]

# UFM telemetry resources are now deployed via Kustomize templates
# Secret and Grafana dashboard ConfigMap are created through:
# - templates/telemetry/ufm/ufm-telemetry-secret.yaml.j2
# - templates/telemetry/ufm/grafana-dashboard-ufm.yaml.j2
# These are processed in generate_telemetry_deployments.yml and applied via kubectl apply -k

- name: Display UFM integration summary
  ansible.builtin.debug:
    msg:
      - "UFM telemetry integration complete"
      - "Endpoint: {{ 'https' if _ufm_detailed_config.tls_mode | default('self_signed') == 'ca_signed' else 'http' }}://{{ _ufm_detailed_config.ufm_endpoint }}:{{ _ufm_detailed_config.ufm_metrics_port | default(9001) }}"
      - "TLS mode: {{ _ufm_detailed_config.tls_mode | default('self_signed') }}"
      - "Auth mode: {{ _ufm_detailed_config.auth_mode | default('basic') }}"
      - "Scrape interval: {{ _ufm_detailed_config.scrape_interval | default('30s') }}"
  when: _ufm_config.metrics_enabled | default(false) | bool
