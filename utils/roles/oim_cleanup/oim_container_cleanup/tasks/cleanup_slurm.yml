---

- name: Set slurm cleanup paths
  ansible.builtin.set_fact:
    slurm_cleanup_path: "{{ omnia_nfs_share }}/slurm"
  tags: slurm

- name: Check if slurm configuration exists
  ansible.builtin.stat:
    path: "{{ slurm_cleanup_path }}"
  register: slurm_path_stat
  tags: slurm

- name: Skip slurm cleanup if not configured
  ansible.builtin.debug:
    msg: "Slurm configuration not found at {{ slurm_cleanup_path }}, skipping slurm cleanup"
  when: not slurm_path_stat.stat.exists
  tags: slurm

- name: Skip slurm cleanup tasks if not configured
  ansible.builtin.meta: end_host
  when: not slurm_path_stat.stat.exists
  tags: slurm

- name: Display slurm cleanup information
  ansible.builtin.debug:
    msg: |
      WARNING: This will delete the entire Slurm configuration directory: {{ slurm_cleanup_path }}
      This includes:
      - All Slurm configuration files (slurm.conf, slurmdbd.conf, gres.conf, cgroup.conf, etc.)
      - Munge authentication files (munge.key and munge setup)
      - Database configuration files (my.cnf.d)
      - All controller and compute node configurations
      This action is destructive and cannot be easily undone.
  tags: slurm

- name: Prompt for pre-cleanup backup
  ansible.builtin.pause:
    prompt: "Before cleanup, take a Slurm config backup? (y/n)"
  register: pre_cleanup_backup
  tags: slurm

- name: Set pre-cleanup backup choice
  ansible.builtin.set_fact:
    pre_cleanup_backup_choice: "{{ pre_cleanup_backup.user_input | default('') | trim | lower }}"
  tags: slurm

- name: Fail if pre-cleanup backup choice is empty
  ansible.builtin.fail:
    msg: "No input provided for pre-cleanup backup prompt. Slurm cleanup aborted."
  when: pre_cleanup_backup_choice | length == 0
  tags: slurm

- name: Validate pre-cleanup backup choice
  ansible.builtin.fail:
    msg: "Invalid input '{{ pre_cleanup_backup.user_input | default('') }}'. Enter 'y' or 'n'."
  when: pre_cleanup_backup_choice not in ['y', 'yes', 'n', 'no']
  tags: slurm

- name: Set slurm backup variables
  ansible.builtin.set_fact:
    share_path: "{{ omnia_nfs_share }}"
    slurm_share_dir_name: slurm
    slurm_backups_dir_name: slurm_backups
  when: pre_cleanup_backup_choice in ['y', 'yes']
  tags: slurm

- name: Run slurm config backup before cleanup
  ansible.builtin.include_role:
    name: slurm_config_backup
  when: pre_cleanup_backup_choice in ['y', 'yes']
  tags: slurm

- name: Display backup completion message
  ansible.builtin.debug:
    msg: "Slurm configuration backup completed. You can restore using: ansible-playbook utils/slurm_config_util.yml --tags config_rollback"
  when: pre_cleanup_backup_choice in ['y', 'yes']
  tags: slurm

- name: Prompt for slurm cleanup confirmation
  ansible.builtin.pause:
    prompt: "This will delete {{ slurm_cleanup_path }}. Type {{ slurm_cleanup_confirm_token }} to continue"
  register: cleanup_confirm
  tags: slurm

- name: Fail if cleanup not confirmed
  ansible.builtin.fail:
    msg: "Slurm cleanup aborted"
  when: cleanup_confirm.user_input != slurm_cleanup_confirm_token
  tags: slurm

- name: Delete slurm configuration directory
  ansible.builtin.file:
    path: "{{ slurm_cleanup_path }}"
    state: absent
  register: slurm_cleanup_result
  tags: slurm

- name: Display slurm cleanup completion message
  ansible.builtin.debug:
    msg: |
      Slurm configuration cleanup completed.
      {% if slurm_cleanup_result.changed %}
      Directory successfully deleted: {{ slurm_cleanup_path }}
      {% else %}
      Directory was already absent: {{ slurm_cleanup_path }}
      {% endif %}
      {% if pre_cleanup_backup_choice in ['y', 'yes'] %}
      Backup was created and can be restored using: ansible-playbook utils/slurm_config_util.yml --tags config_rollback
      {% else %}
      No backup was created. This action cannot be undone.
      {% endif %}
  tags: slurm

