---

- name: Set k8s base path
  ansible.builtin.set_fact:
    k8s_base_path: "{{ (mounts | selectattr('name', 'equalto', 'nfs_slurm') | first).mount_point }}"
  tags: k8s

- name: Build k8s cleanup paths from variable list
  ansible.builtin.set_fact:
    k8s_static_cleanup_paths: []
  tags: k8s

- name: Build cleanup paths using loop
  ansible.builtin.set_fact:
    k8s_static_cleanup_paths: "{{ k8s_static_cleanup_paths + [k8s_base_path + '/' + item] }}"
  loop: "{{ k8s_cleanup_directories }}"
  tags: k8s

- name: Check if static k8s directories exist
  ansible.builtin.stat:
    path: "{{ item }}"
  register: k8s_static_dirs_stat
  loop: "{{ k8s_static_cleanup_paths }}"
  tags: k8s

- name: Find node IP directories when enabled
  block:
    - name: Find all directories in k8s base path
      ansible.builtin.find:
        paths: "{{ k8s_base_path }}"
        file_type: directory
      register: k8s_all_dirs

    - name: Filter IP-named directories using basename
      ansible.builtin.set_fact:
        k8s_ip_dirs: >-
          {{ k8s_all_dirs.files
             | selectattr('path', 'match', k8s_base_path + '/[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
             | map(attribute='path')
             | list }}
  when: k8s_cleanup_node_ips | default(false)
  tags: k8s

- name: Set empty IP dirs list when disabled
  ansible.builtin.set_fact:
    k8s_ip_dirs: []
  when: not k8s_cleanup_node_ips | default(false)
  tags: k8s

- name: Combine all cleanup paths
  ansible.builtin.set_fact:
    k8s_all_cleanup_paths: >-
      {{ (k8s_static_dirs_stat.results
         | selectattr('stat.exists')
         | map(attribute='item')
         | list) + k8s_ip_dirs }}
  tags: k8s

- name: Set cleanup needed flag
  ansible.builtin.set_fact:
    k8s_cleanup_needed: "{{ k8s_all_cleanup_paths | length > 0 }}"
  tags: k8s

- name: Skip k8s cleanup if no directories exist
  ansible.builtin.debug:
    msg: "No K8s-related directories found, skipping k8s cleanup"
  when: not k8s_cleanup_needed | default(false)
  tags: k8s

- name: Skip k8s cleanup tasks if no directories exist
  ansible.builtin.meta: end_host
  when: not k8s_cleanup_needed | default(false)
  tags: k8s

- name: Display k8s cleanup information
  ansible.builtin.debug:
    msg: |
      WARNING: This will delete K8s-related directories from NFS share:
      Base path: {{ k8s_base_path }}
      {% for item in k8s_static_dirs_stat.results %}
      {% if item.stat.exists %}
      - {{ item.item }} ({{ item.item | basename }})
      {% endif %}
      {% endfor %}
      {% if k8s_cleanup_node_ips | default(false) %}
      Node IP directories:
      {% for item in k8s_ip_dirs %}
      - {{ item }} ({{ item | basename }})
      {% else %}
      - No IP directories found
      {% endfor %}
      {% else %}
      Node IP directories: Skipped (k8s_cleanup_node_ips: false)
      {% endif %}
      This action is destructive and cannot be undone.
  tags: k8s

- name: Prompt for k8s cleanup confirmation
  ansible.builtin.pause:
    prompt: "This will delete K8s-related directories. Type {{ k8s_cleanup_confirm_token }} to continue"
  register: k8s_cleanup_confirm
  tags: k8s

- name: Fail if cleanup not confirmed
  ansible.builtin.fail:
    msg: "K8s cleanup aborted"
  when: k8s_cleanup_confirm.user_input | lower != k8s_cleanup_confirm_token | lower
  tags: k8s

- name: Delete static k8s directories
  ansible.builtin.file:
    path: "{{ item.item }}"
    state: absent
  register: k8s_static_cleanup_result
  loop: "{{ k8s_static_dirs_stat.results }}"
  when: item.stat.exists
  tags: k8s

- name: Delete node IP directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  register: k8s_ip_cleanup_result
  loop: "{{ k8s_ip_dirs }}"
  when: k8s_cleanup_node_ips | default(false)
  tags: k8s

- name: Display k8s cleanup completion message
  ansible.builtin.debug:
    msg: |
      K8s-related cleanup completed.
      Base path: {{ k8s_base_path }}
      {% if k8s_static_cleanup_result.results is defined %}
      Static directories:
      {% for item in k8s_static_cleanup_result.results %}
      {% if item is defined and item.changed %}
      ✅ Deleted: {{ item.item }}
      {% elif item is defined and not item.changed %}
      ℹ️  Already absent: {{ item.item }}
      {% endif %}
      {% endfor %}
      {% else %}
      Static directories: None deleted
      {% endif %}
      {% if k8s_cleanup_node_ips | default(false) %}
      {% if k8s_ip_cleanup_result.results is defined %}
      Node IP directories:
      {% for item in k8s_ip_cleanup_result.results %}
      {% if item is defined and item.changed %}
      ✅ Deleted: {{ item.item }}
      {% elif item is defined and not item.changed %}
      ℹ️  Already absent: {{ item.item }}
      {% endif %}
      {% endfor %}
      {% else %}
      Node IP directories: None deleted
      {% endif %}
      {% else %}
      Node IP directories: Skipped
      {% endif %}
  tags: k8s