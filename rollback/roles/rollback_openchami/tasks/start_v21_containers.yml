# ============================================================================
# start_v21_containers.yml — Start v2.1 Containers via openchami.target
# ============================================================================
# After restoring v2.1 quadlet files and openchami.target, start all
# OpenCHAMI services. The restored openchami.target references
# coresmd.service (single container) instead of the v2.2 split services.
#
# Mirrors the start sequence from upgrade_openchami_containers.yml step 9,
# but in reverse — starting the v2.1 service set.
#
# Idempotency:
#   - systemd start is idempotent (no error if already running)
#   - reset-failed + restart recovers any initially failed services
# ============================================================================

- name: Start v2.1 containers
  block:
    # ── Create Podman networks if they don't exist ──────────────────────
    # These networks enable DNS resolution between containers.
    # Without these networks, containers fail with "Could not resolve host" errors.
    # We create them directly with podman as a fallback if network quadlet
    # files weren't in the backup or the network services don't exist.
    - name: Ensure ochami-internal Podman network exists
      ansible.builtin.command: >
        podman network create --ignore ochami-internal
      register: create_internal_net
      changed_when: "'ochami-internal' in create_internal_net.stdout"
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Ensure ochami-jwt-internal Podman network exists
      ansible.builtin.command: >
        podman network create --ignore ochami-jwt-internal
      register: create_jwt_net
      changed_when: "'ochami-jwt-internal' in create_jwt_net.stdout"
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Ensure ochami-cert-internal Podman network exists
      ansible.builtin.command: >
        podman network create --ignore ochami-cert-internal
      register: create_cert_net
      changed_when: "'ochami-cert-internal' in create_cert_net.stdout"
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Ensure ochami-external Podman network exists
      ansible.builtin.command: >
        podman network create --ignore ochami-external
      register: create_ext_net
      changed_when: "'ochami-external' in create_ext_net.stdout"
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Display network creation status
      ansible.builtin.debug:
        verbosity: 1
        msg: >-
          Podman networks ensured: ochami-internal, ochami-jwt-internal,
          ochami-cert-internal, ochami-external

    # ── Start Podman network services if they exist ─────────────────────
    # These systemd services may exist from the openchami RPM installation
    - name: Start OpenCHAMI internal network service
      ansible.builtin.systemd:
        name: openchami-internal-network.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Start OpenCHAMI external network service
      ansible.builtin.systemd:
        name: openchami-external-network.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Start OpenCHAMI cert internal network service
      ansible.builtin.systemd:
        name: openchami-cert-internal-network.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Start OpenCHAMI JWT internal network service
      ansible.builtin.systemd:
        name: openchami-jwt-internal-network.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh
      failed_when: false

    - name: Wait for network services to initialize
      ansible.builtin.pause:
        seconds: 5

    # ── Start all OpenCHAMI services ────────────────────────────────────
    - name: Start openchami.target with v2.1 containers
      ansible.builtin.systemd:
        name: openchami.target
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Start MinIO service
      ansible.builtin.systemd:
        name: minio.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Start registry service
      ansible.builtin.systemd:
        name: registry.service
        state: started
        enabled: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for services to stabilize
      ansible.builtin.pause:
        seconds: "{{ wait_time }}"

    # ── Recover any failed services ─────────────────────────────────────
    - name: Reset any failed services
      ansible.builtin.command: systemctl reset-failed
      changed_when: true
      failed_when: false
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Restart openchami.target to recover failed services
      ansible.builtin.systemd:
        name: openchami.target
        state: restarted
        enabled: true
        daemon_reload: true
      delegate_to: oim
      delegate_facts: true
      connection: ssh

    - name: Wait for restarted services to stabilize
      ansible.builtin.pause:
        seconds: "{{ wait_time }}"

    - name: Display v2.1 container start status
      ansible.builtin.debug:
        verbosity: 1
        msg: "v2.1 OpenCHAMI services started via openchami.target."
